
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>SyncFlow</title>
      <script>
        (function () {
          var locationState = window.location;
          if (locationState.search[1] !== '/') return;

          var decodedPath = locationState.search
            .slice(1)
            .replace(/~and~/g, '&');

          var nextUrl =
            locationState.pathname.slice(0, -1) +
            decodedPath +
            locationState.hash;

          window.history.replaceState(null, '', nextUrl);
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
